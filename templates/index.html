<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

/* 🌈 Multicolor Logo */
.logo {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  background: linear-gradient(90deg, #3b82f6, #22c55e, #f59e0b, #ef4444);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

form {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Fix dropdown */
select option {
  background: black;
  color: white;
}

button {
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

.total {
  font-size: 20px;
  margin-bottom: 15px;
}

.expense {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.07);
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}

.delete {
  color: red;
  text-decoration: none;
}

/* Chart */
.chart {
  margin-top: 25px;
  text-align: center;
}

.chart img {
  max-width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2 class="logo"> Kharcha app</h2>

  <form method="POST" action="/add">
    <input type="text" name="desc" placeholder="Description" required>
    <input type="number" name="amt" placeholder="Amount ₹" required>
    <select name="cat">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Entertainment</option>
      <option>Health</option>
      <option>Other</option>
    </select>
    <button type="submit">Add</button>
  </form>

  <div class="total">Total: ₹{{ total }}</div>

  {% for e in expenses %}
  <div class="expense">
    <span>{{ e.desc }} ({{ e.cat }})</span>
    <span>₹{{ e.amt }}</span>
    <a class="delete" href="/delete/{{ loop.index0 }}">✖</a>
  </div>
  {% endfor %}

  {% if chart %}
  <div class="chart">
    <h3>📊 Category Breakdown</h3>
    <img src="data:image/png;base64,{{ chart }}">
  </div>
  {% endif %}

</div>

</body>
</html>
